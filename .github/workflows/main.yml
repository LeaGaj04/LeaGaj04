name: Generate Snake

on:
  schedule: # Se ejecuta automáticamente cada 12 horas
    - cron: "0 */12 * * *"
  workflow_dispatch: # Te permite ejecutarlo manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: LeaGaj04
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#ff3333&color_dots=#161b22,#641e1e,#962828,#c83232,#ff3333
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push SVG to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
